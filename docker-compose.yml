services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  gateway:
    build:
      context: .
      dockerfile: build/gateway.Dockerfile
    environment:
      APP_HTTP_ADDR: :8080
      APP_GRPC_ADDR: :9090
      APP_REDIS_ADDR: redis:6379
      APP_MINIO_ENDPOINT: minio:9000
      APP_MINIO_ACCESS_KEY: minioadmin
      APP_MINIO_SECRET_KEY: minioadmin
      APP_MINIO_USE_SSL: "false"
      APP_SUBMISSIONS_BUCKET: submissions
      APP_RESULTS_BUCKET: results
      APP_TESTS_BUCKET: tests
      APP_QUEUE_NAME: runs:queue
      APP_EVENTS_CHANNEL: runs:events
      APP_STATE_PREFIX: "runs:state:"
      APP_POLL_INTERVAL_MS: "250"
      APP_BOOTSTRAP_TESTS_DIR: /app/testdata/minio/tests
    depends_on:
      - redis
      - minio
    ports:
      - "8080:8080"
      - "9090:9090"

  worker:
    build:
      context: .
      dockerfile: build/worker.Dockerfile
    environment:
      APP_REDIS_ADDR: redis:6379
      APP_MINIO_ENDPOINT: minio:9000
      APP_MINIO_ACCESS_KEY: minioadmin
      APP_MINIO_SECRET_KEY: minioadmin
      APP_MINIO_USE_SSL: "false"
      APP_SUBMISSIONS_BUCKET: submissions
      APP_RESULTS_BUCKET: results
      APP_TESTS_BUCKET: tests
      APP_QUEUE_NAME: runs:queue
      APP_EVENTS_CHANNEL: runs:events
      APP_STATE_PREFIX: "runs:state:"
    depends_on:
      - redis
      - minio
